services:
  mariadb:
    image: mariadb:11.4
    container_name: blog-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: blog
      MARIADB_USER: blog
      MARIADB_PASSWORD: blog1234
      MARIADB_ROOT_PASSWORD: root1234
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:
