<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Posts</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <header class="header">
        <h1>학습 블로그</h1>
        <a class="button" th:href="@{/posts/new}">새 글 작성</a>
    </header>

    <section class="card-list">
        <article class="card" th:if="${#lists.isEmpty(posts)}">
            <h2>아직 작성된 글이 없습니다.</h2>
            <p>첫 번째 글을 작성해 보세요.</p>
        </article>

        <article class="card" th:each="post : ${posts}">
            <div class="meta">
                <span th:text="${post.categoryName()}">Category</span>
                <span th:text="${post.status()}">PUBLISHED</span>
            </div>
            <h2 th:text="${post.title()}">제목</h2>
            <p class="excerpt" th:text="${#strings.abbreviate(post.content(), 120)}">본문 일부</p>
            <a class="link" th:href="@{|/posts/${post.id()}|}">상세 보기</a>
        </article>
    </section>
</main>
</body>
</html>
